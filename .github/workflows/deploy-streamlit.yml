name: Deploy Streamlit to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Log in to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/real-estate-streamlit:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/real-estate-streamlit:latest
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with: 
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          # service_account_key: ${{ secrets.GCP_SA_KEY }}
                    
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy real-estate-ui \
            --image=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/real-estate-streamlit:latest \
            --region=${{ secrets.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --project=${{ secrets.GCP_PROJECT_ID }}
